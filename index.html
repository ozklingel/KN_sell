<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת תמונות</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}
</style>
</head>

<body>

<h1>בדיקת תמונות</h1>

<div class="gallery">
    living-room.jpg" alt="סלון">
    kitchen-main.jpg" alt="מטבח">
    kitchen-island.jpg" alt="אי">
    kitchen-wide.jpg" alt="מטבח רחב">
    <img src="balcony-seating.jpg" alt="מרפסת">
    <img src="balcony-view.jpg" alt="נוף">
    <img src="view-open.jpg" alt="נוף פתוח">
    <img src="bathroom.jpg" alt="חדר רחצה">
</div>

</body>
</html>
